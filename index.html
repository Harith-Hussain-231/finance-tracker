<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="color-scheme" content="dark" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Finance" />
<meta name="theme-color" content="#141414" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>Finance Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* MacroFactor look: pure black, flat charcoal cards, candy data colours */
    --bg:#141414; --surface:#262626; --surface2:#2E2E2E; --raised:#363636;
    --line:#2A2A2A; --lineSoft:#222222;
    --text:#E8E8E6; --textDim:#9E9E9E; --textFaint:#7A7A7A;
    /* one bright accent for primary; signal colours map to money meaning */
    --accent:#9B7DF5; --accentDim:#2A2150; --accentSoft:rgba(155,125,245,.15); --accentGlow:rgba(155,125,245,.12);
    --rust:#F5703C; --rustSoft:rgba(245,112,60,.14);
    --amber:#F0C040; --amberSoft:rgba(240,192,64,.14);
    --green:#34C759; --greenSoft:rgba(52,199,89,.14);
    --blue:#4A90F0; --orange:#F5703C; --yellow:#F0C040; --purple:#8B5CF6;
    --r-card:20px; --r-inner:14px; --r-pill:99px;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--text); color-scheme:dark; }
  body { font-family:'Inter',-apple-system,system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  input,select,textarea,button { font-family:inherit; font-size:16px; color:var(--text); }
  .mono { font-family:'IBM Plex Mono',ui-monospace,monospace; font-variant-numeric:tabular-nums; letter-spacing:-.02em; }
  /* the signature: bold condensed all-caps display */
  .display { font-family:'Archivo',sans-serif; font-weight:800; font-stretch:expanded; text-transform:uppercase; letter-spacing:-.01em; line-height:.98; }
  .wrap { max-width:480px; margin:0 auto; min-height:100vh; padding:calc(54px + env(safe-area-inset-top)) 18px calc(100px + env(safe-area-inset-bottom)); }

  /* hero balance — dark raised, glow */
  .hero { position:relative; border-radius:var(--r-card); padding:22px 20px 20px; margin-bottom:22px; overflow:hidden;
    background:var(--surface); }

  /* segmented control — pill, soft active */
  .seg { display:flex; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-pill); padding:4px; gap:3px; margin-bottom:20px; }
  .seg button { flex:1; padding:10px 4px; font-size:12.5px; font-weight:600; border:none; background:transparent; color:var(--textDim); border-radius:var(--r-pill); transition:all .18s cubic-bezier(.4,0,.2,1); letter-spacing:.01em; }
  .seg button.on { background:var(--text); color:var(--bg); }

  /* group card */
  .grp { background:var(--surface); border:1px solid transparent; border-radius:var(--r-card); margin-bottom:12px; overflow:hidden; }
  .grp-head { width:100%; display:flex; justify-content:space-between; align-items:center; padding:16px 17px; background:none; border:none; text-align:left; transition:background .12s; }
  .grp-head:active { background:var(--surface2); }
  .row-item { display:flex; justify-content:space-between; align-items:center; padding:13px 17px; border-top:1px solid var(--lineSoft); }
  .row-item:first-child { border-top:none; }

  .wk-head { width:100%; display:flex; justify-content:space-between; align-items:center; padding:11px 17px; background:var(--surface2); border:none; border-top:1px solid var(--lineSoft); text-align:left; transition:background .12s; }
  .wk-head:active { background:var(--raised); }

  .btn { width:100%; border:none; border-radius:var(--r-inner); padding:14px; font-weight:600; font-size:14px; transition:transform .12s, opacity .12s; }
  .btn:active { transform:scale(.985); opacity:.85; }
  .btn-accent { background:var(--accent); color:#FFFFFF; }
  .btn-ghost { background:var(--surface2); color:var(--text); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn-line { background:transparent; color:var(--textDim); border:1px solid var(--line); }

  .input { width:100%; box-sizing:border-box; -webkit-appearance:none; appearance:none; min-height:46px; border:1px solid var(--line); border-radius:var(--r-inner); padding:12px 13px; font-size:15px; background:var(--surface2); color:var(--text); font-family:inherit; }
  .input[type="date"] { min-height:46px; line-height:1.2; }
  .input::placeholder { color:var(--textFaint); }
  .label { font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--textDim); margin-bottom:5px; display:block; font-weight:600; }

  .chip { padding:3px 9px; border-radius:var(--r-pill); font-size:11px; font-weight:600; flex-shrink:0; background:var(--amberSoft); color:var(--amber); white-space:nowrap; }
  .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; display:inline-block; }

  .tabbar { position:fixed; left:0; right:0; bottom:0; z-index:40; display:flex; justify-content:center;
    padding-bottom:env(safe-area-inset-bottom); background:rgba(20,20,20,.86); backdrop-filter:blur(20px) saturate(1.4); -webkit-backdrop-filter:blur(20px) saturate(1.4); border-top:1px solid var(--line); }
  .tabbar-inner { display:flex; width:100%; max-width:480px; }
  .tab { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:12px 0 9px; background:none; border:none; color:var(--textFaint); transition:color .15s; }
  .tab.on { color:var(--text); }
  .tab span { font-size:10px; font-weight:600; letter-spacing:.03em; }

  .sheet-bg { position:fixed; inset:0; background:rgba(0,0,0,.66); z-index:50; display:flex; align-items:flex-end; justify-content:center; backdrop-filter:blur(4px); animation:fade .2s ease; }
  .sheet { width:100%; max-width:480px; background:var(--surface); border:1px solid var(--line); border-bottom:none; border-radius:26px 26px 0 0; padding:22px; padding-bottom:calc(22px + env(safe-area-inset-bottom)); max-height:90vh; overflow-y:auto; animation:slideup .26s cubic-bezier(.4,0,.2,1); }
  .full { position:fixed; inset:0; background:var(--bg); z-index:45; overflow-y:auto; }
  @keyframes fade { from{opacity:0} to{opacity:1} }
  @keyframes slideup { from{transform:translateY(100%)} to{transform:translateY(0)} }

  .icon-btn { background:none; border:none; padding:0; display:inline-flex; align-items:center; cursor:pointer; transition:opacity .12s; }
  .icon-btn:active { opacity:.5; }
  .pill-btn { display:inline-flex; align-items:center; gap:6px; padding:9px 14px; border-radius:var(--r-pill); background:var(--surface2); border:1px solid var(--line); color:var(--text); font-size:13px; font-weight:600; }
  .trunc { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .eyebrow { font-size:11px; text-transform:uppercase; letter-spacing:.14em; color:var(--textDim); font-weight:600; }
  ::-webkit-scrollbar { width:0; height:0; }
  svg { display:block; }
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";

(function () {

  // ---------- constants ----------
  var THEME = {
    paper:'#EFEDE4', card:'#FBFAF5', ink:'#222820', inkSoft:'#646B5C',
    border:'#D8D6C8', borderSoft:'#E8E6DA', green:'#3A7150', rust:'#9F4A30',
    rustSoft:'#F3E4DE', amber:'#B07D1E', amberSoft:'#F3E9CF'
  };
  var CATEGORY_COLORS = {
    'Income':'#34C759','Housing':'#F0A040','Bills':'#4A90F0','Council Tax':'#8B5CF6',
    'Phone & Internet':'#40C0D0','Food':'#F5703C','Transport':'#FF6B5B','Personal':'#F0C040',
    'Childcare':'#F080B0','Debt & Cards':'#FF5B5B','Outings':'#5BA0FF','Other':'#9A9A9A'
  };
  var CATEGORY_NAMES = Object.keys(CATEGORY_COLORS);
  var DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  var DEFAULT_RECURRING = [
    {name:'Salary',type:'income',amount:3171,cadence:'monthly',dayOfMonth:28,group:''},
    {name:'Mortgage',type:'expense',amount:1500,cadence:'monthly',dayOfMonth:1,group:'Home'},
    {name:'Utilities',type:'expense',amount:220,cadence:'monthly',dayOfMonth:1,group:'Home'},
    {name:'Council Tax',type:'expense',amount:165,cadence:'monthly',dayOfMonth:1,group:'Home'},
    {name:'Phone',type:'expense',amount:20,cadence:'monthly',dayOfMonth:1,group:'Bills'},
    {name:'Internet',type:'expense',amount:37,cadence:'monthly',dayOfMonth:15,group:'Bills'},
    {name:'Fuel',type:'expense',amount:100,cadence:'monthly',dayOfMonth:8,group:'Car'},
    {name:'Amex',type:'expense',amount:500,cadence:'monthly',dayOfMonth:19,variable:true,group:'Debt'},
    {name:'Food shop',type:'expense',amount:150,cadence:'weekly',dayOfWeek:1,group:'Living'},
    {name:'Personal',type:'expense',amount:50,cadence:'weekly',dayOfWeek:1,group:'Living'}
  ];
  var STORAGE_KEY = 'wc-planner-html-v5dark';
  var HORIZON = 26;
  var CURSYM = {GBP:'£',USD:'$',EUR:'€'};

  // ---------- date / format helpers ----------
  function genId(){ return 'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
  function pad(n){ return n<10?'0'+n:''+n; }
  function isoDate(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function todayISO(){ return isoDate(new Date()); }
  function parseISO(s){ return new Date(s+'T00:00:00'); }
  function addDays(d,n){ var x=new Date(d); x.setDate(x.getDate()+n); return x; }
  function getMonday(v){ var d = typeof v==='string'?parseISO(v):new Date(v); var day=d.getDay(); return addDays(d,(day===0?-6:1)-day); }
  function fmt(a,c){ c=c||'GBP'; var s=CURSYM[c]||'£'; var v=Math.abs(a).toLocaleString('en-GB',{maximumFractionDigits:0}); return (a<0?'\u2212':'')+s+v; }
  function fmtSigned(a,c){ c=c||'GBP'; var s=CURSYM[c]||'£'; var v=Math.abs(a).toLocaleString('en-GB',{maximumFractionDigits:0}); var sign=a>0?'+':a<0?'\u2212':''; return sign+s+v; }
  function weekLabel(m){ var mon=parseISO(m), sun=addDays(mon,6); if(m===isoDate(getMonday(new Date())))return 'This week'; return mon.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' \u2013 '+sun.toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
  function dayLabel(s){ return parseISO(s).toLocaleDateString('en-GB',{weekday:'short',day:'numeric'}); }
  function monthSpan(m){ return parseISO(m).toLocaleDateString('en-GB',{month:'long',year:'numeric'}); }
  function monthlyEquiv(item){
    if(item.cadence==='weekly') return (item.amount*52/12)/((item.interval&&item.interval>0)?item.interval:1);
    return item.amount/((item.monthInterval&&item.monthInterval>0)?item.monthInterval:1);
  }

  function seed(){
    return {
      currentBalance:1790, asOfDate:todayISO(), currency:'GBP', payDay:28, viewMode:'weekly',
      recurring: DEFAULT_RECURRING.map(function(r,i){ var o={}; for(var k in r)o[k]=r[k]; o.id='r'+i; o.active=true; o.order=i; return o; }),
      oneOffs:[], skips:{}, overrides:{}
    };
  }

  // ---------- persistence (localStorage works in Safari / Home Screen) ----------
  var storageOK = true;
  function migrate(d){
    // Fill defaults for fields added in later versions so older exports import cleanly.
    // If data is missing/corrupt (null, non-object), fall back to a fresh seed so the app
    // always has a valid object to work with rather than crashing downstream.
    if(!d || typeof d!=='object') d=seed();
    if(!Array.isArray(d.recurring)) d.recurring=[];
    var seenIds={};
    d.recurring.forEach(function(r,i){
      if(r.id===undefined||r.id===null||r.id==='') r.id=genId();
      if(seenIds[r.id]) r.id=genId(); // dedupe collisions from hand-edited/corrupt imports
      seenIds[r.id]=true;
      if(r.active===undefined) r.active=true;
      if(r.group===undefined) r.group='';
      if(r.order===undefined) r.order=i;
      if(r.cadence==='weekly' && (r.interval===undefined||r.interval===null)) r.interval=1;
      if(r.cadence==='monthly' && (r.monthInterval===undefined||r.monthInterval===null)) r.monthInterval=1;
    });
    if(!d.oneOffs) d.oneOffs=[];
    if(!d.skips) d.skips={};
    if(!d.overrides) d.overrides={};
    if(!d._debtOvKeys||typeof d._debtOvKeys!=='object') d._debtOvKeys={};
    if(!d.oneOffOverrides) d.oneOffOverrides={}; // reserved
    if(d.payDay===undefined) d.payDay=28;
    if(d.viewMode===undefined) d.viewMode='weekly';
    if(!d.asOfDate) d.asOfDate=todayISO();
    if(d.snapshot===undefined) d.snapshot=null; // frozen forecast: {date, data} or null
    // Credit card config (one card). Off until enabled.
    if(d.card===undefined){
      d.card={ enabled:false, name:'Amex', statementStartDay:8, paymentDay:19, paymentMonthOffset:0, rollWeekend:true, manual:{}, openingAmount:0, openingPaymentDate:'' };
    } else {
      if(d.card.manual===undefined) d.card.manual={};
      if(d.card.rollWeekend===undefined) d.card.rollWeekend=true;
      if(d.card.statementStartDay===undefined) d.card.statementStartDay=8;
      if(d.card.paymentDay===undefined) d.card.paymentDay=19;
      if(d.card.paymentMonthOffset===undefined) d.card.paymentMonthOffset=0;
      if(d.card.name===undefined) d.card.name='Amex';
      if(!d.card.consumed||typeof d.card.consumed!=='object') d.card.consumed={};
      if(!d.card.consumed||typeof d.card.consumed!=='object') d.card.consumed={};
    }
    // Debts (paydown trackers). Each owns a linked recurring expense so payments flow into the forecast.
    if(!Array.isArray(d.debts)) d.debts=[];
    d.debts.forEach(function(db){
      if(db.id===undefined||db.id===null||db.id==='') db.id=genId();
      if(db.rollWeekend===undefined) db.rollWeekend=true;
      if(!db.overrides||typeof db.overrides!=='object') db.overrides={};
      if(db.cadence!=='weekly'&&db.cadence!=='monthly') db.cadence='monthly';
      if(db.cadence==='weekly'&&(!db.interval||db.interval<1)) db.interval=1;
      if(db.group===undefined) db.group='Debt';
      if(db.onCard===undefined) db.onCard=false;
    });
    // Savings pots. Each owns a linked recurring expense (the monthly contribution) that deducts
    // from the forecast, like debts. Plus optional one-off top-ups and a goal (target + date).
    if(!Array.isArray(d.pots)) d.pots=[];
    d.pots.forEach(function(p){
      if(p.id===undefined||p.id===null||p.id==='') p.id=genId();
      if(p.rollWeekend===undefined) p.rollWeekend=true;
      if(typeof p.contribution!=='number') p.contribution=0;
      if(typeof p.startBalance!=='number') p.startBalance=0;
      if(!Array.isArray(p.topups)) p.topups=[];
      if(p.paymentDay===undefined) p.paymentDay=1;
      if(p.group===undefined) p.group='Savings';
    });
    // Self-heal: if a linked expense exists (sourceDebtId/sourcePotId) but its parent debt/pot is
    // missing — e.g. data saved by an older build that dropped them on import — rebuild a best-effort
    // parent so it reappears on the Money screen. Amounts recoverable from the expense; original/target
    // can't be recovered exactly (estimated for debts, left blank for pots to re-enter).
    (function(){
      if(!Array.isArray(d.recurring)) return;
      var debtIds={}; d.debts.forEach(function(x){debtIds[x.id]=true;});
      var potIds={}; d.pots.forEach(function(x){potIds[x.id]=true;});
      d.recurring.forEach(function(it){
        if(it.sourceDebtId && !debtIds[it.sourceDebtId]){
          debtIds[it.sourceDebtId]=true;
          var weekly=it.cadence==='weekly';
          d.debts.push({ id:it.sourceDebtId, name:it.name||'Debt', original:(it.amount||0)*12, payment:it.amount||0,
            startDate:it.startDate||todayISO(), paymentDay:it.dayOfMonth||1, cadence:weekly?'weekly':'monthly',
            interval:it.interval||1, dayOfWeek:it.dayOfWeek, rollWeekend:it.rollWeekend!==false,
            group:it.group||'Debt', onCard:!!it.onCard, overrides:{}, _recovered:true });
        }
        if(it.sourcePotId && !potIds[it.sourcePotId]){
          potIds[it.sourcePotId]=true;
          d.pots.push({ id:it.sourcePotId, name:it.name||'Savings', contribution:it.amount||0, startBalance:0,
            startDate:it.startDate||todayISO(), paymentDay:it.dayOfMonth||1, rollWeekend:it.rollWeekend!==false,
            group:it.group||'Savings', target:0, targetDate:it.endDate||'', topups:[], _recovered:true });
        }
      });
    })();
    return d;
  }
  function loadData(){
    try { var raw=localStorage.getItem(STORAGE_KEY); return migrate(raw?JSON.parse(raw):seed()); }
    catch(e){ storageOK=false; return migrate(seed()); }
  }
  function saveData(d){
    if(typeof root!=='undefined' && root) root._bgBuilt=false; // data changed → force full rebuild next render
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); storageOK=true; return true; }
    catch(e){ storageOK=false; return false; }
  }

  // ----- England & Wales bank holidays -----
  // Computed per year (with weekend substitutes), cached. Covers the standard set; one-off
  // holidays (jubilees etc.) aren't predictable and would be handled via a per-item override.
  var _bhCache={};
  function nthWeekdayOfMonth(y, month, weekday, n){ // weekday: 0=Sun..6=Sat; n=1 first, etc.
    var d=new Date(y,month,1); var count=0;
    while(d.getMonth()===month){ if(d.getDay()===weekday){ count++; if(count===n) return new Date(d); } d=addDays(d,1); }
    return null;
  }
  function lastWeekdayOfMonth(y, month, weekday){
    var d=new Date(y,month+1,0); // last day of month
    while(d.getDay()!==weekday) d=addDays(d,-1);
    return d;
  }
  function easterSunday(y){ // Anonymous Gregorian algorithm
    var a=y%19, b=Math.floor(y/100), c=y%100, d=Math.floor(b/4), e=b%4,
        f=Math.floor((b+8)/25), g=Math.floor((b-f+1)/3), h=(19*a+b-d-g+15)%30,
        i=Math.floor(c/4), k=c%4, l=(32+2*e+2*i-h-k)%7, m=Math.floor((a+11*h+22*l)/451),
        month=Math.floor((h+l-7*m+114)/31), day=((h+l-7*m+114)%31)+1;
    return new Date(y, month-1, day);
  }
  function substitute(d, taken){ // bump weekend holiday to next free weekday
    var x=new Date(d);
    while(x.getDay()===0 || x.getDay()===6 || taken[isoDate(x)]) x=addDays(x,1);
    return x;
  }
  function bankHolidays(y){
    if(_bhCache[y]) return _bhCache[y];
    var set={}; var taken={};
    function add(d){ var k=isoDate(d); set[k]=true; taken[k]=true; }
    // New Year's Day (+ substitute)
    add(substitute(new Date(y,0,1), taken));
    // Easter
    var es=easterSunday(y);
    add(addDays(es,-2)); // Good Friday
    add(addDays(es,1));  // Easter Monday
    // Early May (first Monday), Spring (last Monday May), Summer (last Monday Aug)
    add(nthWeekdayOfMonth(y,4,1,1));
    add(lastWeekdayOfMonth(y,4,1));
    add(lastWeekdayOfMonth(y,7,1));
    // Christmas + Boxing Day (+ substitutes, Boxing after Christmas)
    var xmas=substitute(new Date(y,11,25), taken); add(xmas);
    add(substitute(new Date(y,11,26), taken));
    _bhCache[y]=set;
    return set;
  }
  function isBankHoliday(d){ return !!bankHolidays(d.getFullYear())[isoDate(d)]; }
  function isNonWorking(d){ var day=d.getDay(); return day===0||day===6||isBankHoliday(d); }

  function rollIfWeekend(d){
    // Expenses: roll FORWARD to the next working day (skips weekends and bank holidays).
    var x=new Date(d); var guard=0;
    while(isNonWorking(x) && guard++<14) x=addDays(x,1);
    return x;
  }
  function rollToFriday(d){
    // Income: roll BACK to the previous working day (skips weekends and bank holidays).
    var x=new Date(d); var guard=0;
    while(isNonWorking(x) && guard++<14) x=addDays(x,-1);
    return x;
  }

  // ----- Credit card cycle maths -----
  // A statement cycle runs from statementStartDay of one month to (startDay-1) of the next.
  // Returns {start, end, closeMonthY, closeMonthM, key} for the cycle containing `date`.
  function cycleFor(date, startDay){
    var d=new Date(date); d.setHours(0,0,0,0);
    var y=d.getFullYear(), m=d.getMonth();
    // start of cycle is startDay in this month if date>=startDay, else previous month
    var startThis=new Date(y,m,Math.min(startDay,new Date(y,m+1,0).getDate()));
    var start;
    if(d>=startThis){ start=startThis; }
    else { var pm=m-1, py=y; if(pm<0){pm=11;py--;} start=new Date(py,pm,Math.min(startDay,new Date(py,pm+1,0).getDate())); }
    // end = day before next cycle start
    var sy=start.getFullYear(), sm=start.getMonth();
    var nm=sm+1, ny=sy; if(nm>11){nm=0;ny++;}
    var nextStart=new Date(ny,nm,Math.min(startDay,new Date(ny,nm+1,0).getDate()));
    var end=addDays(nextStart,-1);
    // the cycle "closes" on `end`; close month is end's month
    return { start:start, end:end, closeY:end.getFullYear(), closeM:end.getMonth(), key:isoDate(start) };
  }
  // payment date for a cycle that closes in (closeY, closeM).
  // Payment month is derived automatically: if the payment day-of-month falls on or before the
  // cycle's close day, the payment must be the following month (it can't precede the close in the
  // same month); otherwise it's the same month. closeDay = day-of-month the cycle closes (its end).
  // roll: 'mon' rolls weekends forward to Monday, 'fri' rolls back to Friday, falsy = no roll.
  function cardPaymentDate(closeY, closeM, paymentDay, roll, closeDay){
    var offset = (closeDay!==undefined && paymentDay<=closeDay) ? 1 : 0;
    var py=closeY, pm=closeM+offset;
    while(pm>11){ pm-=12; py++; }
    var dim=new Date(py,pm+1,0).getDate();
    var pd=new Date(py, pm, Math.min(paymentDay,dim));
    if(roll==='fri') return rollToFriday(pd);

    var mode = stx.snapMode || fd.viewMode || 'weekly';
    var isPeriod=(mode==='payperiod'||mode==='month');

    // hero
    wrap.appendChild(el('div',{style:{marginBottom:'14px'}},[
      el('div',{class:'eyebrow',style:{marginBottom:'6px'}},'Balance at capture'),
      el('div',{class:'mono',style:{fontSize:'30px',fontWeight:'600',lineHeight:'1',letterSpacing:'-.03em'}}, fmt(fd.currentBalance,fd.currency))
    ]));

    // view toggle (session-only mode)
    var seg=el('div',{class:'seg',style:{marginBottom:'14px'}});
    [['weekly','Weekly'],['payperiod','Payday'],['month','Monthly']].forEach(function(m){
      seg.appendChild(el('button',{class:mode===m[0]?'on':'',onClick:(function(mm){return function(){ stx.snapMode=mm; render(); };})(m[0])},m[1]));
    });
    wrap.appendChild(seg);

    // Build buckets from the FROZEN data, projecting from the capture date. We set the globals
    // (data, viewMode, override, expanded) only for the synchronous build below, then restore.
    var liveData=data, liveMode=fd.viewMode;
    data=fd; fd.viewMode=mode; __todayOverride=snap.date;
    var rows=[];
    try{
      var buckets = mode==='payperiod'?buildPayPeriods(fd):(mode==='month'?buildMonths(fd):buildWeeks(fd));
      buckets.forEach(function(bucket,idx){
        if(mode==='weekly'){
          var showM = idx===0||monthSpan(bucket.key)!==monthSpan(buckets[idx-1].key);
          if(showM) rows.push(el('div',{class:'eyebrow',style:{marginTop:idx===0?'4px':'18px',marginBottom:'9px',paddingLeft:'3px'}},monthSpan(bucket.key)));
        }
        rows.push(periodCard(bucket, mode, isPeriod, true));
      });
    } finally {
      data=liveData; fd.viewMode=liveMode; __todayOverride=null;
    }
    rows.forEach(function(r){ wrap.appendChild(r); });
    return wrap;
  }

    toolsBtn.appendChild(svg('<circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/>',22,C.textDim));

    // mini insight: lowest point
    var wkAll=buildWeeks(data);
    var low=wkAll[0]; wkAll.forEach(function(b){ if(b.endBalance<low.endBalance)low=b; });
    if(low && low.endBalance<data.currentBalance){
      var lowCol=low.endBalance<0?C.rust:C.amber;
      var sub=el('div',{style:{fontSize:'12.5px',marginTop:'14px',color:C.textDim,position:'relative',display:'flex',alignItems:'center',gap:'7px'}});

      sub.appendChild(document.createTextNode('Lowest ahead '));
      sub.appendChild(el('strong',{style:{color:lowCol,fontWeight:'600'}},fmt(low.endBalance,data.currency)));
      sub.appendChild(el('span',{style:{color:C.textFaint}},'· '+weekLabel(low.key)));
      hero.appendChild(sub);
    } else {
      hero.appendChild(el('div',{style:{fontSize:'12.5px',marginTop:'14px',color:C.textDim,position:'relative'}},'Trending steady across the next 6 months'));

    wrap.appendChild(hero);

    // view toggle

    var isPeriod=(mode==='payperiod'||mode==='month');
    var seg=el('div',{class:'seg'});
    [['weekly','Weekly'],['payperiod','Payday'],['month','Monthly']].forEach(function(m){
      var on=mode===m[0];
      seg.appendChild(el('button',{class:on?'on':'',onClick:function(){ data.viewMode=m[0]; expanded={}; commit(); }},m[1]));
    });
    wrap.appendChild(seg);

    var buckets = mode==='payperiod'?buildPayPeriods(data):(mode==='month'?buildMonths(data):wkAll);

    // below-zero alert
    var firstNeg=null, lowestB=buckets[0];
    buckets.forEach(function(b){ if(firstNeg===null&&b.endBalance<0)firstNeg=b; if(b.endBalance<lowestB.endBalance)lowestB=b; });
    if(firstNeg){
      var lbl=isPeriod?periodTitle(firstNeg):weekLabel(firstNeg.key);
      var msg='Dips below zero ('+fmt(firstNeg.endBalance,data.currency)+') around '+lbl+'.';
      if(lowestB&&lowestB!==firstNeg&&lowestB.endBalance<firstNeg.endBalance) msg+=' Lowest '+fmt(lowestB.endBalance,data.currency)+' around '+(isPeriod?periodTitle(lowestB):weekLabel(lowestB.key))+'.';
      var warn=el('div',{style:{borderRadius:'14px',padding:'12px 14px',marginBottom:'14px',display:'flex',gap:'9px',alignItems:'flex-start',background:C.rustSoft}});
      var ic=el('div',{style:{marginTop:'1px',flexShrink:'0'}}); ic.appendChild(svg(ICON3.warn,15,C.rust)); warn.appendChild(ic);
      warn.appendChild(el('div',{style:{fontSize:'12px',color:C.rust,lineHeight:'1.4'}},msg));
      wrap.appendChild(warn);
    }

    buckets.forEach(function(bucket,idx){
      if(mode==='weekly'){
        var showM = idx===0||monthSpan(bucket.key)!==monthSpan(buckets[idx-1].key);
        if(showM) wrap.appendChild(el('div',{class:'eyebrow',style:{marginTop:idx===0?'4px':'18px',marginBottom:'9px',paddingLeft:'3px'}},monthSpan(bucket.key)));
      }
      wrap.appendChild(periodCard(bucket, mode, isPeriod));
    });

    full.appendChild(wrap);
    return full;
  }

  function periodTitle(b){
    var mode=data.viewMode;
    return mode==='month'?b.start.toLocaleDateString('en-GB',{month:'long'}):b.end.toLocaleDateString('en-GB',{month:'long'});
  }

  function periodCard(bucket, mode, isPeriod, readOnly){
    var key=bucket.key;
    var exp = readOnly ? (stx.snapExpanded||(stx.snapExpanded={})) : expanded;
    var open=(key in exp)?exp[key]:false;
    var neg=bucket.endBalance<0;
    var grp=el('div',{class:'grp',style:neg?{borderColor:C.rust}:null});
    var head=el('button',{class:'grp-head',onClick:function(){ exp[key]=!open; if(readOnly) stx.snapScroll=getScroll(); render(); }});
    var left=el('div',{style:{minWidth:'0',display:'flex',gap:'11px',alignItems:'center'}});
    var chev=svg(ICON3.chevron,15,C.textFaint); chev.style.transform=open?'rotate(90deg)':'none'; chev.style.transition='transform .18s'; chev.style.flexShrink='0';
    left.appendChild(chev);

    var today=todayMidnight();
    var titleText, subText, isCurrent;
    if(isPeriod){
      isCurrent=today>=bucket.start&&today<=bucket.end;
      titleText=(mode==='month'?bucket.start.toLocaleDateString('en-GB',{month:'long',year:'numeric'}):bucket.end.toLocaleDateString('en-GB',{month:'long',year:'numeric'}))+(isCurrent?' · now':'');
      subText=bucket.start.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' – '+bucket.end.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    } else {
      isCurrent=(key===isoDate(getMonday(today)));
      titleText=weekLabel(key)+(isCurrent?' · now':'');
      subText=fmtSigned(bucket.inflow,data.currency)+' in · '+fmtSigned(-bucket.outflow,data.currency)+' out';
    }
    // Weekly view has no nested rows, so the chip lives on the week header here.
    // Period views (month/payday) show the chip on their nested week rows instead.
    var hasAmex = !isPeriod && (bucket.items||[]).some(function(it){return it.isCard;});

    var titleRow=el('div',{style:{display:'flex',gap:'7px',alignItems:'center',minWidth:'0'}},[
      el('div',{class:'trunc',style:{fontSize:'15px',fontWeight:'600',color:isCurrent?C.accent:C.text}},titleText)
    ]);
    if(hasAmex) titleRow.appendChild(el('span',{class:'chip'},(data.card&&data.card.name)||'Amex'));
    var tb=el('div',{style:{minWidth:'0'}},[
      titleRow,
      el('div',{style:{fontSize:'11px',marginTop:'2px',color:C.textDim}},subText)
    ]);
    left.appendChild(tb);
    head.appendChild(left);
    var rt=el('div',{style:{textAlign:'right',flexShrink:'0',paddingLeft:'10px'}});
    rt.appendChild(el('div',{class:'mono',style:{fontSize:'16px',fontWeight:'600',color:neg?C.rust:C.text}},fmt(bucket.endBalance,data.currency)));
    rt.appendChild(el('div',{style:{fontSize:'10px',marginTop:'1px',color:C.textFaint,textTransform:'uppercase',letterSpacing:'.06em'}}, mode==='payperiod'?'at payday':(mode==='month'?'month end':'week end')));
    head.appendChild(rt);
    grp.appendChild(head);

    if(open){
      if(isPeriod){
        var nonEmpty=(bucket.weeks||[]).filter(function(w){return w.items.length>0;});
        if(nonEmpty.length===0) grp.appendChild(el('div',{style:{padding:'16px 17px',fontSize:'12px',color:C.textDim}},'Nothing planned this '+(mode==='month'?'month':'period')+'.'));
        nonEmpty.forEach(function(w){
          var wkKey='wk:'+w.key, wkOpen=(wkKey in exp)?exp[wkKey]:false;
          var wh=el('button',{class:'wk-head',onClick:function(){ exp[wkKey]=!wkOpen; if(readOnly) stx.snapScroll=getScroll(); render(); }});
          var wl=el('div',{style:{display:'flex',gap:'8px',alignItems:'center'}});
          var wc=svg(ICON3.chevron,12,C.textFaint); wc.style.transform=wkOpen?'rotate(90deg)':'none'; wc.style.transition='transform .18s';
          wl.appendChild(wc);
          wl.appendChild(el('div',{style:{fontSize:'12px',fontWeight:'600',color:C.textDim}},w.segStart.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' – '+w.segEnd.toLocaleDateString('en-GB',{day:'numeric',month:'short'})));
          if(w.items.some(function(it){return it.isCard;})) wl.appendChild(el('span',{class:'chip'},(data.card&&data.card.name)||'Amex'));
          wh.appendChild(wl);
          wh.appendChild(el('div',{class:'mono',style:{fontSize:'12px',fontWeight:'600',color:w.endBalance<0?C.rust:C.textDim}},fmt(w.endBalance,data.currency)));
          grp.appendChild(wh);
          if(wkOpen){ w.items.forEach(function(it){ grp.appendChild(itemRow(it, readOnly)); }); if(!readOnly) grp.appendChild(addRow(isoDate(w.segStart))); }
        });
        var nextAmex=amexStatementPaidAfter(data,bucket.end);
        if(nextAmex>0){
          var ft=el('div',{style:{padding:'16px 17px',borderTop:'1px solid '+C.line,background:C.surface2}});
          ft.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'3px'}},[
            el('div',{style:{fontSize:'12px',color:C.textDim}},(mode==='month'?'Month end':'Period end')),
            el('div',{class:'mono',style:{fontSize:'13px',fontWeight:'600',color:bucket.endBalance<0?C.rust:C.text}},fmt(bucket.endBalance,data.currency))
          ]));
          var after=bucket.endBalance-nextAmex;
          ft.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between'}},[
            el('div',{style:{fontSize:'12px',color:C.textDim}},'After next '+(data.card.name||'Amex')+' ('+fmt(nextAmex,data.currency)+')'),
            el('div',{class:'mono',style:{fontSize:'13px',fontWeight:'600',color:after<0?C.rust:C.accent}},fmt(after,data.currency))
          ]));
          grp.appendChild(ft);
        }
      } else {
        if(bucket.items.length===0) grp.appendChild(el('div',{style:{padding:'16px 17px',fontSize:'12px',color:C.textDim}},'Nothing planned this week.'));
        bucket.items.forEach(function(it){ grp.appendChild(itemRow(it, readOnly)); });
        if(!readOnly) grp.appendChild(addRow(key));
      }
    }
    return grp;
  }

  function itemRow(item, readOnly){
    var r=el('div',{class:'row-item'});
    var info=el('button',{style:{flex:'1',minWidth:'0',display:'flex',gap:'10px',alignItems:'center',background:'none',border:'none',textAlign:'left',padding:'0',cursor:readOnly?'default':'pointer'},
      onClick:function(){
        if(readOnly) return;
        if(item.isCard){ tab='card'; modal=null; if(item.cycleKey){ stx.cardExpanded={}; stx.cardExpanded[item.cycleKey]=true; stx.scrollToCycle=item.cycleKey; } render(); return; }
        if(item.sourceDebtId){ tab='debts'; stx.moneySub='debts'; modal={type:'editDebt',id:item.sourceDebtId}; render(); return; }
        if(item.sourcePotId){ tab='debts'; stx.moneySub='savings'; modal={type:'editPot',id:item.sourcePotId}; render(); return; }
        if(item.recurring){ modal={type:'occ',key:item.id,recurringId:item.recurringId,name:item.name,date:item.date,amount:String(item.amount)}; }
        else { modal={type:'editOneoff',id:item.id,name:item.name,amount:String(item.amount),ttype:item.type,date:item.date}; }
        render();
      }});
    info.appendChild(el('span',{class:'dot',style:{background:item.isCard?C.amber:(item.sourceDebtId?C.accent:(item.sourcePotId?C.green:(item.type==='income'?C.green:C.rust)))}}));
    var nm=el('div',{style:{minWidth:'0'}});
    var nameLine=el('div',{class:'trunc',style:{fontSize:'14px',fontWeight:'500'}},item.name);
    nm.appendChild(nameLine);
    var meta=el('div',{style:{fontSize:'11px',marginTop:'1px',color:C.textFaint,display:'flex',gap:'5px',alignItems:'center'}});
    meta.appendChild(document.createTextNode(dayLabel(item.date)));
    if(item.isCard){ var c1=el('span',{class:'chip'},'statement'); meta.appendChild(c1); }
    if(item.sourceDebtId){ var cd=el('span',{class:'chip',style:{background:C.accentSoft,color:C.accent}},'debt'); meta.appendChild(cd); }
    if(item.sourcePotId){ var cs=el('span',{class:'chip',style:{background:C.greenSoft,color:C.green}},'savings'); meta.appendChild(cs); }
    if(item.estimated){ var c2=el('span',{class:'chip'},'est'); meta.appendChild(c2); }
    nm.appendChild(meta);
    info.appendChild(nm);
    r.appendChild(info);
    var rt=el('div',{style:{display:'flex',gap:'12px',alignItems:'center',flexShrink:'0'}});
    rt.appendChild(el('span',{class:'mono',style:{fontSize:'14px',fontWeight:'600',color:item.type==='income'?C.green:C.text}},fmtSigned(item.type==='income'?item.amount:-item.amount,data.currency)));
    if(!readOnly && !item.isCard && !item.sourceDebtId && !item.sourcePotId){
      var del=el('button',{class:'icon-btn','aria-label':'Remove',onClick:function(){ if(item.recurring){ data.skips[item.id]=true; } else { data.oneOffs=(data.oneOffs||[]).filter(function(o){return o.id!==item.id;}); } commit(); }});
      del.appendChild(svg(ICON3.x,15,C.textFaint)); rt.appendChild(del);
    }
    r.appendChild(rt);
    return r;
  }

  /* ---------- check-in sheet: update balance + Amex ---------- */
  function renderCheckinSheet(){
    var bg=el('div',{class:'sheet-bg',onClick:function(e){ if(e.target===bg){ modal=null; render(); } }});
    var sh=el('div',{class:'sheet'});
    sh.appendChild(el('div',{style:{width:'36px',height:'4px',borderRadius:'2px',background:C.line,margin:'0 auto 18px'}}));
    sh.appendChild(el('div',{style:{fontSize:'18px',fontWeight:'700',marginBottom:'4px'}},'Check in'));
    sh.appendChild(el('div',{style:{fontSize:'12px',color:C.textDim,marginBottom:'18px',lineHeight:'1.5'}},'Update your real balance so the forecast stays accurate.'));

    // ---- Balance ----
    sh.appendChild(el('div',{class:'label'},'Balance today'));
    var balVal = (stx.ciBalance!==undefined ? stx.ciBalance : data.currentBalance);
    var bal=el('input',{class:'input mono',style:{fontSize:'20px',marginBottom:'6px'},type:'number',inputmode:'decimal',value:balVal});
    bal.addEventListener('input',function(e){ stx.ciBalance=e.target.value; });
    sh.appendChild(bal);
    sh.appendChild(el('div',{style:{fontSize:'11px',color:C.textFaint,marginBottom:'22px'}},'Last set '+(data.asOfDate?parseISO(data.asOfDate).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'—')));

    // ---- Amex section ----
    var card=data.card;
    if(card && card.enabled!==false){
      var ss=card.statementStartDay||8;
      var roles0=currentAndNextCycleKeys(card, todayMidnight());
      sh.appendChild(el('div',{style:{borderTop:'1px solid '+C.lineSoft,margin:'4px 0 18px'}}));
      sh.appendChild(el('div',{style:{fontSize:'14px',fontWeight:'700',marginBottom:'3px'}},(card.name||'Amex')));
      sh.appendChild(el('div',{style:{fontSize:'11px',color:C.textFaint,marginBottom:'14px',lineHeight:'1.4'}},'The figures from your '+(card.name||'Amex')+' app.'));

      // Balance due (always)
      sh.appendChild(el('div',{class:'label'},'Balance due'));
      var due=el('input',{class:'input mono',style:{marginBottom:'14px'},type:'number',inputmode:'decimal',value:(stx.ciDue!==undefined?stx.ciDue:(card.openingAmount||'')),placeholder:'0'});
      due.addEventListener('input',function(e){ stx.ciDue=e.target.value; });
      sh.appendChild(due);

      // Total balance — revealed by + (statement generated)
      var hasTotal = (roles0.nextKey && card.manual && card.manual[roles0.nextKey]>0);
      var showTotal = stx.ciShowTotal || hasTotal;
      if(!showTotal){
        var link=el('button',{style:{display:'flex',alignItems:'center',gap:'7px',background:'none',border:'none',color:C.accent,fontSize:'13px',fontWeight:'600',padding:'2px 0'},onClick:function(){ stx.ciShowTotal=true; render(); }});
        link.appendChild(svg(ICON3.plus,15,C.accent));
        link.appendChild(document.createTextNode('Add total balance'));
        sh.appendChild(link);
        sh.appendChild(el('div',{style:{fontSize:'10px',marginTop:'6px',color:C.textFaint,lineHeight:'1.4'}},'Once your statement generates, add the card\u2019s total balance.'));
      } else {
        sh.appendChild(el('div',{class:'label'},'Total balance'));
        var tot=el('input',{class:'input mono',type:'number',inputmode:'decimal',value:(stx.ciTotal!==undefined?stx.ciTotal:((roles0.nextKey&&card.manual&&card.manual[roles0.nextKey])||'')),placeholder:'0'});
        tot.addEventListener('input',function(e){ stx.ciTotal=e.target.value; });
        sh.appendChild(tot);
        sh.appendChild(el('div',{style:{fontSize:'10px',marginTop:'6px',color:C.textFaint}},'Everything on the card today.'));
      }
    }

    // ---- Save ----
    var save=el('button',{class:'btn btn-accent',style:{marginTop:'24px'},onClick:function(){
      // balance
      if(stx.ciBalance!==undefined && stx.ciBalance!==''){ var v=parseFloat(stx.ciBalance); if(!isNaN(v)){ data.currentBalance=v; data.asOfDate=todayISO(); } }
      // amex due
      if(card && card.enabled!==false){
        if(stx.ciDue!==undefined){ var dv=parseFloat(stx.ciDue); card.openingAmount=isNaN(dv)?0:dv; }
        var roles1=currentAndNextCycleKeys(card, todayMidnight());
        if(stx.ciShowTotal || (roles1.nextKey&&card.manual&&card.manual[roles1.nextKey]>0)){
          if(stx.ciTotal!==undefined){ if(!card.manual)card.manual={}; var tv=parseFloat(stx.ciTotal); if(tv>0)card.manual[roles1.nextKey]=tv; else delete card.manual[roles1.nextKey]; }
        }
      }
      stx.ciBalance=undefined; stx.ciDue=undefined; stx.ciTotal=undefined; stx.ciShowTotal=false;
      modal=null; saveData(data); if(root)root._bgBuilt=false; render();
    }},'Save');
    sh.appendChild(save);
    sh.appendChild(el('button',{class:'btn btn-line',style:{marginTop:'8px'},onClick:function(){ stx.ciBalance=undefined; stx.ciDue=undefined; stx.ciTotal=undefined; stx.ciShowTotal=false; modal=null; render(); }},'Cancel'));

    bg.appendChild(sh);
    return bg;
  }

    ]));

      var dr=el('div',{style:{display:'flex',gap:'10px',marginBottom:'13px'}});
      var w1=el('div',{style:{flex:'1'}}); w1.appendChild(el('label',{class:'label'},'Statement starts'));
      var s1=el('select',{class:'input'}); for(var i=1;i<=28;i++){ var o=el('option',{value:i},'Day '+i); if(i===(card.statementStartDay||8))o.selected=true; s1.appendChild(o);} s1.addEventListener('change',function(e){ card.statementStartDay=parseInt(e.target.value,10); commit(); }); w1.appendChild(s1); dr.appendChild(w1);
      var w2=el('div',{style:{flex:'1'}}); w2.appendChild(el('label',{class:'label'},'Payment day'));
      var s2=el('select',{class:'input'}); for(var j=1;j<=28;j++){ var o2=el('option',{value:j},'Day '+j); if(j===(card.paymentDay||19))o2.selected=true; s2.appendChild(o2);} s2.addEventListener('change',function(e){ card.paymentDay=parseInt(e.target.value,10); commit(); }); w2.appendChild(s2); dr.appendChild(w2);
      cfg.appendChild(dr);
      cfg.appendChild(rowToggle('Move weekend payments to Monday',card.rollWeekend!==false,function(v){ card.rollWeekend=v; commit(); }));
      var ss=card.statementStartDay||8;
      var closeDay=(ss-1)||31; // a cycle closes the day before the next start
      var sameMonth=(card.paymentDay||19)>closeDay;
      var whenTxt=sameMonth?'day '+(card.paymentDay||19)+' that month':'day '+(card.paymentDay||19)+' of the following month';
      cfg.appendChild(el('div',{style:{fontSize:'11px',marginTop:'10px',color:C.textFaint,lineHeight:'1.4'}},'Runs day '+ss+' → day '+closeDay+' next month, paid '+whenTxt+'. The payment month is worked out automatically from the two days above.'));
      wrap.appendChild(cfg);

      // ── "Your Amex right now" — read-only summary; edit via Check-in ──
      var roles0=currentAndNextCycleKeys(card, todayMidnight());
      var nextPay=nextCardPaymentOnOrAfter(card, todayMidnight());
      var payTxt=nextPay?nextPay.toLocaleDateString('en-GB',{day:'numeric',month:'long'}):'—';
      var totalBal=(roles0.nextKey&&card.manual&&card.manual[roles0.nextKey])||0;
      var nextCyc2 = roles0.nextKey ? cycleFor(parseISO(roles0.nextKey),ss) : null;
      var nextPayDate2 = nextCyc2 ? cardPaymentDate(nextCyc2.closeY, nextCyc2.closeM, card.paymentDay||19, (card.rollWeekend!==false?'mon':false), nextCyc2.end.getDate()) : null;
      var nextPayTxt2 = nextPayDate2 ? nextPayDate2.toLocaleDateString('en-GB',{day:'numeric',month:'long'}) : '—';

      var ob=el('div',{class:'grp',style:{marginBottom:'16px',padding:'16px 17px'}});
      var obHead=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'3px'}});
      obHead.appendChild(el('div',{style:{fontSize:'14px',fontWeight:'700'}},'Your '+(card.name||'Amex')+' right now'));
      // secondary-tap edit -> opens the Check-in sheet (canonical entry point)
      var editBtn=el('button',{style:{display:'flex',alignItems:'center',gap:'5px',background:'none',border:'none',color:C.accent,fontSize:'12px',fontWeight:'600',padding:'2px 0'},onClick:function(){ modal={type:'checkin'}; stx.ciShowTotal=(totalBal>0); render(); }});
      editBtn.appendChild(svg(ICON3.edit||'<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>',13,C.accent));
      editBtn.appendChild(document.createTextNode('Update'));
      obHead.appendChild(editBtn);
      ob.appendChild(obHead);
      ob.appendChild(el('div',{style:{fontSize:'11px',color:C.textFaint,marginBottom:'14px',lineHeight:'1.4'}},'Updated from Check-in. Tap Update to change these figures.'));

      // Read-only: Balance due
      ob.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'10px',padding:'4px 0'}},[
        el('div',{style:{minWidth:'0'}},[
          el('div',{style:{fontSize:'13px',fontWeight:'600'}},'Balance due'),
          el('div',{style:{fontSize:'10px',marginTop:'1px',color:C.textFaint}},'Pays '+payTxt)
        ]),
        el('div',{class:'mono',style:{fontSize:'16px',fontWeight:'700',color:(card.openingAmount>0?C.amber:C.textFaint)}}, card.openingAmount>0?fmt(card.openingAmount,data.currency):'—')
      ]));

      // Read-only: Total balance (only if entered)
      if(totalBal>0){
        ob.appendChild(el('div',{style:{borderTop:'1px solid '+C.lineSoft,margin:'10px 0'}}));
        ob.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'10px',padding:'4px 0'}},[
          el('div',{style:{minWidth:'0'}},[
            el('div',{style:{fontSize:'13px',fontWeight:'600'}},'Total balance'),
            el('div',{style:{fontSize:'10px',marginTop:'1px',color:C.textFaint}},'Everything on the card today')
          ]),
          el('div',{class:'mono',style:{fontSize:'16px',fontWeight:'700',color:C.amber}}, fmt(totalBal,data.currency))
        ]));
      }

      // Plain-English result line
      if(card.openingAmount>0 || totalBal>0){
        var res=el('div',{style:{marginTop:'14px',padding:'11px 13px',borderRadius:'12px',background:C.surface2,fontSize:'11px',color:C.textDim,lineHeight:'1.5'}});
        var parts=[];
        if(card.openingAmount>0) parts.push('You\u2019ll pay '+fmt(card.openingAmount,data.currency)+' on '+payTxt+'.');
        if(totalBal>0){
          var carry=Math.max(0,totalBal-(card.openingAmount||0));
          parts.push(carry>0 ? (fmt(carry,data.currency)+' of new spending has started next month\u2019s bill (due '+nextPayTxt2+').') : ('Nothing new on next month\u2019s bill yet (due '+nextPayTxt2+').'));
        }
        res.appendChild(el('div',null,parts.join(' ')));
        ob.appendChild(res);
      } else {
        ob.appendChild(el('div',{style:{marginTop:'12px',fontSize:'11px',color:C.textFaint,lineHeight:'1.4'}},'No figures yet \u2014 tap Update to enter your balance due.'));
      }
      wrap.appendChild(ob);

      // statements
      wrap.appendChild(el('div',{class:'eyebrow',style:{marginBottom:'9px',paddingLeft:'3px'}},'Statements'));
      var today=todayMidnight();
      var roles=currentAndNextCycleKeys(card, today);
      var flaggedByCycle={}, futureFlaggedByCycle={}, breakdownByCycle={};
      (function(){
        var scanEnd=addDays(today,7*31);
        var manualMap=card.manual||{};
        // A passed (already-dated) line is "covered" — folded into a real figure you've entered —
        // when: the current cycle has this-month's-bill (openingAmount) entered; OR the next cycle
        // has a total card balance entered (that total already includes these charges); OR any cycle
        // has its own manual figure. In all cases only PAST-dated lines are covered; future ones stay.
        function isCovered(ckey, passed){
          if(!passed) return false;
          if(ckey===roles.currentKey && (card.openingAmount||0)>0) return true;
          if(ckey===roles.nextKey && (manualMap[ckey]||0)>0) return true;
          if(ckey!==roles.nextKey && (manualMap[ckey]||0)>0) return true;
          return false;
        }
        function addLine(ck,name,date,amt,covered,okey){ if(!breakdownByCycle[ck])breakdownByCycle[ck]=[]; breakdownByCycle[ck].push({name:name,date:date,sum:amt,covered:covered,okey:okey}); }
        data.recurring.forEach(function(it){ if(it.onCard&&it.type==='expense'){ occurrences(it,addDays(today,-40),scanEnd).forEach(function(d){ var k=it.id+'|'+d; if(data.skips&&data.skips[k])return; var ov=data.overrides?data.overrides[k]:undefined; var amt=(ov!==undefined&&ov!==null)?ov:it.amount; var c=cycleFor(parseISO(d),ss); var passed=parseISO(d)<=today; var covered=isCovered(c.key,passed); if(!covered) flaggedByCycle[c.key]=(flaggedByCycle[c.key]||0)+amt; if(!passed) futureFlaggedByCycle[c.key]=(futureFlaggedByCycle[c.key]||0)+amt; addLine(c.key,it.name,d,amt,covered,k); }); } });
        (data.oneOffs||[]).forEach(function(o){ if(o.onCard&&o.type==='expense'){ var c=cycleFor(parseISO(o.date),ss); var passed=parseISO(o.date)<=today; var covered=isCovered(c.key,passed); if(!covered) flaggedByCycle[c.key]=(flaggedByCycle[c.key]||0)+o.amount; if(!passed) futureFlaggedByCycle[c.key]=(futureFlaggedByCycle[c.key]||0)+o.amount; addLine(c.key,o.name||'One-off',o.date,o.amount,covered,'oneoff|'+(o.id||o.date)); } });
      })();
      var loopC=cycleFor(today,ss);
      for(var ci=0;ci<6;ci++){
        (function(c){
          var isNext = c.key===roles.nextKey;
          var isCurrent = c.key===roles.currentKey;
          var flagged=flaggedByCycle[c.key]||0;
          var man=(card.manual&&card.manual[c.key])||0;
          var total;
          var phase2cur = (card.manual&&card.manual[roles.nextKey]>0);
          if(isCurrent && (card.openingAmount||0)>0){
            // Phase 2 (total balance entered → statement generated): bill is fixed, bill only.
            // Phase 1 (mid-cycle): bill + this cycle's future estimates.
            total = phase2cur ? card.openingAmount : (card.openingAmount + (futureFlaggedByCycle[c.key]||0));
          } else if(isNext && man>0){
            // next statement: man is the TOTAL balance; carry = total − current statement
            var carry=Math.max(0, man-(card.openingAmount||0));
            total=carry + (futureFlaggedByCycle[c.key]||0);
          } else {
            total=flagged+man;
          }
          var pay=cardPaymentDate(c.closeY,c.closeM,card.paymentDay||19,(card.rollWeekend!==false?'mon':false),c.end.getDate());
          var cOpen=!!stx.cardExpanded[c.key];
          var g=el('div',{class:'grp',style:{marginBottom:'10px'},'data-cycle':c.key});
          var gh=el('button',{class:'grp-head',onClick:function(){ stx.cardExpanded[c.key]=!cOpen; render(); }});
          var gl=el('div',{style:{minWidth:'0'}});
          gl.appendChild(el('div',{style:{fontSize:'14px',fontWeight:'600'}},c.start.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' – '+c.end.toLocaleDateString('en-GB',{day:'numeric',month:'short'})));
          gl.appendChild(el('div',{style:{fontSize:'11px',marginTop:'2px',color:C.textDim}},'Pays '+pay.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+(isNext?' · next':'')));
          gh.appendChild(gl);
          gh.appendChild(el('div',{class:'mono',style:{fontSize:'16px',fontWeight:'600',color:total>0?C.text:C.textFaint}},fmt(total,data.currency)));
          g.appendChild(gh);
          if(cOpen){
            var lines=(breakdownByCycle[c.key]||[]).slice().sort(function(x,y){return x.date<y.date?-1:(x.date>y.date?1:0);});
            if(lines.length===0&&man<=0) g.appendChild(el('div',{style:{padding:'10px 17px',fontSize:'11px',color:C.textFaint}},'Nothing flagged in this statement yet.'));
            lines.forEach(function(it){
              var amtColor = it.covered ? C.textFaint : C.textDim;
              var passed = parseISO(it.date)<=today;
              // Only future lines on the NEXT PAYABLE statement (the current cycle) can be marked
              // partly/fully consumed early. Consumed is display-only; total balance drives the maths.
              var canConsume = (c.key===roles.currentKey) && !passed && !it.covered && it.okey;
              var consumedAmt = (card.consumed && it.okey && card.consumed[it.okey]>0) ? Math.min(card.consumed[it.okey], it.sum) : 0;
              var subText;
              if(it.covered) subText = dayLabel(it.date);
              else if(consumedAmt>0 && consumedAmt>=it.sum) subText = dayLabel(it.date)+' · all spent';
              else if(consumedAmt>0) subText = dayLabel(it.date)+' · '+fmt(consumedAmt,data.currency)+' spent · '+fmt(it.sum-consumedAmt,data.currency)+' to come';
              else subText = dayLabel(it.date);
              var fullyConsumed = consumedAmt>0 && consumedAmt>=it.sum;
              var nameCell = el('div',{style:{minWidth:'0'}},[
                el('div',{class:'trunc',style:{fontSize:'13px',color:(it.covered||fullyConsumed)?C.textFaint:C.text}}, it.name+(it.covered?' · in manual':'')),
                el('div',{style:{fontSize:'10px',marginTop:'1px',color:(consumedAmt>0&&!it.covered)?C.accent:C.textFaint}}, subText)
              ]);
              var amtCell = el('div',{class:'mono',style:{fontSize:'13px',flexShrink:'0',color:(it.covered||fullyConsumed)?C.textFaint:amtColor,textDecoration:(it.covered||fullyConsumed)?'line-through':'none'}},fmt(it.sum,data.currency));
              var rowEl;
              if(canConsume){
                rowEl=el('button',{style:{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',gap:'10px',padding:'7px 17px',borderTop:'1px solid '+C.lineSoft,background:'none',border:'none',borderBottom:'none',textAlign:'left'},onClick:function(){ modal={type:'consume',okey:it.okey,name:it.name,date:it.date,sum:it.sum}; render(); }});
                rowEl.appendChild(nameCell); rowEl.appendChild(amtCell);
              } else {
                rowEl=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'10px',padding:'7px 17px',borderTop:'1px solid '+C.lineSoft}},[ nameCell, amtCell ]);
              }
              g.appendChild(rowEl);
            });
            if(isCurrent){
              if((card.openingAmount||0)>0){
                if(phase2cur){
                  // Statement generated: bill is fixed until paid.
                  g.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'10px',padding:'10px 17px',borderTop:'1px solid '+C.lineSoft}},[
                    el('div',{style:{fontSize:'12px',color:C.textDim,minWidth:'0',lineHeight:'1.3'}},'Statement generated · fixed until paid'),
                    el('div',{class:'mono',style:{fontSize:'13px',flexShrink:'0',color:C.textDim}},fmt(card.openingAmount,data.currency))
                  ]));
                } else {
                  // Mid-cycle: bill so far + future estimates (consumed shifts to already-spent).
                  var rawToCome=futureFlaggedByCycle[c.key]||0;
                  var consumedInCycle=0;
                  (breakdownByCycle[c.key]||[]).forEach(function(ln){ if(parseISO(ln.date)>today && card.consumed && card.consumed[ln.okey]>0){ consumedInCycle+=Math.min(card.consumed[ln.okey], ln.sum); } });
                  var toCome=Math.max(0, rawToCome-consumedInCycle);
                  var alreadySpent=card.openingAmount+consumedInCycle;
                  var noteTxt = consumedInCycle>0
                    ? fmt(alreadySpent,data.currency)+' spent ('+fmt(card.openingAmount,data.currency)+' bill + '+fmt(consumedInCycle,data.currency)+' early) + '+fmt(toCome,data.currency)+' to come'
                    : fmt(card.openingAmount,data.currency)+' bill + '+fmt(toCome,data.currency)+' to come';
                  g.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'10px',padding:'10px 17px',borderTop:'1px solid '+C.lineSoft}},[
                    el('div',{style:{fontSize:'12px',color:C.textDim,minWidth:'0',lineHeight:'1.3'}}, noteTxt),
                    el('div',{class:'mono',style:{fontSize:'13px',flexShrink:'0',color:C.textDim}},fmt(alreadySpent+toCome,data.currency))
                  ]));
                }
              } else {
                g.appendChild(el('div',{style:{padding:'10px 17px',fontSize:'11px',color:C.textFaint,borderTop:'1px solid '+C.lineSoft,lineHeight:'1.4'}},'Enter this month\u2019s bill at the top to set this statement.'));
              }
            } else if(isNext){
              // The total-balance input now lives in the unified card above; show the carry here read-only.
              var mv=(card.manual&&card.manual[c.key])||0;
              if(mv>0){
                var carry2=Math.max(0,mv-(card.openingAmount||0));
                g.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'10px',padding:'10px 17px',borderTop:'1px solid '+C.lineSoft}},[
                  el('div',{style:{fontSize:'12px',color:C.textDim,minWidth:'0',lineHeight:'1.3'}},'Already spent (from total balance)'),
                  el('div',{class:'mono',style:{fontSize:'13px',flexShrink:'0',color:C.textDim}},fmt(carry2,data.currency))
                ]));
              } else {
                g.appendChild(el('div',{style:{padding:'10px 17px',fontSize:'11px',color:C.textFaint,borderTop:'1px solid '+C.lineSoft,lineHeight:'1.4'}},'Add your total card balance at the top to set this statement\u2019s starting point.'));
              }
            } else {
              var mwrap=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'10px',padding:'10px 17px',borderTop:'1px solid '+C.lineSoft}});
              mwrap.appendChild(el('div',{style:{fontSize:'13px',color:C.textDim,minWidth:'0'}},'Manual spend'));
              var mi=el('input',{class:'input mono',style:{width:'110px',padding:'7px 9px',textAlign:'right',flexShrink:'0'},type:'number',inputmode:'decimal',value:man||'',placeholder:'0'});
              mi.addEventListener('input',function(e){ if(!card.manual)card.manual={}; var v=parseFloat(e.target.value); if(v>0)card.manual[c.key]=v; else delete card.manual[c.key]; saveQuiet(); gh.lastChild.textContent=fmt((flaggedByCycle[c.key]||0)+(card.manual[c.key]||0),data.currency); });
              mwrap.appendChild(mi);
              g.appendChild(mwrap);
            }
          }
          wrap.appendChild(g);
        })(loopC);
        loopC=cycleFor(addDays(loopC.end,1),ss);
      }
    }
    return wrap;
  }

  function recSub(item){

    return cad+(ex.length?' · '+ex.join(' · '):'');
  }

    var holder=el('div',{style:{marginTop:'10px'}});
    var btn=el('button',{class:'btn btn-ghost',onClick:function(){ expanded['__add']=!open; render(); }});
    btn.appendChild(svg(ICON3.plus,16,C.accent)); btn.appendChild(document.createTextNode(open?'Close':'Add recurring item'));
    holder.appendChild(btn);
    if(open){
      var nw=stx.nw;
      var card=el('div',{class:'grp',style:{marginTop:'10px',padding:'16px 17px'}});
      card.appendChild(el('label',{class:'label'},'Name'));
      var nm=el('input',{class:'input',value:nw.name,placeholder:'What is it?'}); nm.addEventListener('input',function(e){ nw.name=e.target.value; }); card.appendChild(nm);
      card.appendChild(el('label',{class:'label',style:{marginTop:'10px'}},'Amount'));
      var am=el('input',{class:'input mono',type:'number',inputmode:'decimal',value:nw.amount,placeholder:'0'}); am.addEventListener('input',function(e){ nw.amount=e.target.value; }); card.appendChild(am);
      card.appendChild(el('label',{class:'label',style:{marginTop:'10px'}},'Type'));
      var tg=el('div',{class:'seg',style:{marginBottom:'0'}}); ['expense','income'].forEach(function(t){ tg.appendChild(el('button',{class:nw.type===t?'on':'',onClick:function(){ nw.type=t; render(); }},t==='expense'?'Expense':'Income')); }); card.appendChild(tg);
      card.appendChild(el('label',{class:'label',style:{marginTop:'10px'}},'Repeats'));
      var cg=el('div',{class:'seg',style:{marginBottom:'0'}}); ['monthly','weekly'].forEach(function(cd){ cg.appendChild(el('button',{class:nw.cadence===cd?'on':'',onClick:function(){ nw.cadence=cd; render(); }},cd==='monthly'?'Monthly':'Weekly')); }); card.appendChild(cg);
      if(nw.cadence==='weekly'){
        card.appendChild(el('label',{class:'label',style:{marginTop:'10px'}},'Day of week'));
        var ws=el('select',{class:'input'}); ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(function(d,i){ var o=el('option',{value:i+1},d); if(nw.dayOfWeek===i+1)o.selected=true; ws.appendChild(o); }); ws.addEventListener('change',function(e){ nw.dayOfWeek=parseInt(e.target.value,10); }); card.appendChild(ws);
        var fr=el('div',{style:{display:'flex',gap:'8px',alignItems:'center',marginTop:'10px'}});
        fr.appendChild(el('span',{style:{fontSize:'13px',color:C.textDim}},'Every'));
        var iv=el('input',{class:'input mono',style:{width:'60px',textAlign:'center'},type:'number',inputmode:'numeric',value:nw.interval||1});
        iv.addEventListener('input',function(e){ var raw=e.target.value; if(raw==='')return; var v=parseInt(raw,10); if(v&&v>0){ var was=nw.interval; nw.interval=v; if((was>1)!==(v>1))render(); } });
        iv.addEventListener('blur',function(e){ var v=parseInt(e.target.value,10); if(!v||v<1){ nw.interval=1; render(); } });
        fr.appendChild(iv); fr.appendChild(el('span',{style:{fontSize:'13px',color:C.textDim}},'week(s)')); card.appendChild(fr);
        if((nw.interval||1)>1){
          card.appendChild(el('label',{class:'label',style:{marginTop:'10px'}},'Anchor date'));
          var an=el('input',{class:'input',type:'date',value:nw.anchor||''}); an.addEventListener('change',function(e){ nw.anchor=e.target.value; }); card.appendChild(an);
        }
      } else {
        card.appendChild(el('label',{class:'label',style:{marginTop:'10px'}},'Day of month'));
        var ds=el('select',{class:'input'}); for(var i=1;i<=28;i++){ var o=el('option',{value:i},'Day '+i); if(nw.dayOfMonth===i)o.selected=true; ds.appendChild(o); } ds.addEventListener('change',function(e){ nw.dayOfMonth=parseInt(e.target.value,10); }); card.appendChild(ds);
        var mfr=el('div',{style:{display:'flex',gap:'8px',alignItems:'center',marginTop:'10px'}});
        mfr.appendChild(el('span',{style:{fontSize:'13px',color:C.textDim}},'Every'));
        var mv=el('input',{class:'input mono',style:{width:'60px',textAlign:'center'},type:'number',inputmode:'numeric',value:nw.monthInterval||1});
        mv.addEventListener('input',function(e){ var raw=e.target.value; if(raw==='')return; var v=parseInt(raw,10); if(v&&v>0){ var was=nw.monthInterval; nw.monthInterval=v; if((was>1)!==(v>1))render(); } });
        mv.addEventListener('blur',function(e){ var v=parseInt(e.target.value,10); if(!v||v<1){ nw.monthInterval=1; render(); } });
        mfr.appendChild(mv); mfr.appendChild(el('span',{style:{fontSize:'13px',color:C.textDim}},'month(s)')); card.appendChild(mfr);
        if((nw.monthInterval||1)>1){
          card.appendChild(el('label',{class:'label',style:{marginTop:'10px'}},'Anchor month'));
          var man=el('input',{class:'input',type:'date',value:nw.monthAnchor||''}); man.addEventListener('change',function(e){ nw.monthAnchor=e.target.value; }); card.appendChild(man);
        }
      }
      card.appendChild(el('label',{class:'label',style:{marginTop:'10px'}},'Group (optional)'));
      var grp=el('input',{class:'input',value:nw.group,placeholder:'e.g. Housing'}); grp.addEventListener('input',function(e){ nw.group=e.target.value; }); card.appendChild(grp);
      if(data.card&&data.card.enabled&&nw.type==='expense'){
        card.appendChild(rowToggle('Pays via '+(data.card.name||'Amex'), !!nw.onCard, function(v){ nw.onCard=v; }));
      }
      card.appendChild(el('label',{class:'label',style:{marginTop:'12px'}},'Ends on (optional)'));
      var ce=el('input',{class:'input',type:'date',value:nw.endDate||''}); ce.addEventListener('change',function(e){ nw.endDate=e.target.value; }); card.appendChild(ce);
      card.appendChild(el('button',{class:'btn btn-accent',style:{marginTop:'14px'},onClick:function(){
        var amt=parseFloat(nw.amount); if(!nw.name.trim()||!amt)return;
        var maxOrder=data.recurring.reduce(function(m,r){return Math.max(m,r.order||0);},0);
        var it={name:nw.name.trim(),type:nw.type,amount:amt,cadence:nw.cadence,dayOfMonth:nw.dayOfMonth,dayOfWeek:nw.dayOfWeek,group:(nw.group||'').trim(),order:maxOrder+1,id:genId(),active:true};
        if(nw.cadence==='weekly'){ it.interval=nw.interval||1; if(it.interval>1&&nw.anchor)it.anchor=nw.anchor; }
        else { it.monthInterval=nw.monthInterval||1; if(it.monthInterval>1&&nw.monthAnchor)it.monthAnchor=nw.monthAnchor; }
        if(nw.onCard&&nw.type==='expense') it.onCard=true;
        if(nw.endDate) it.endDate=nw.endDate;
        data.recurring.push(it); stx.nw=newItemBlank(); expanded['__add']=false; commit();
      }},'Add item'));
      holder.appendChild(card);
    }
    return holder;
  }

  // ---------- boot ----------
  try { render(); }
  catch(e){ root.innerHTML='<div style="padding:24px;font-family:sans-serif;color:#1F2421"><b>Something went wrong loading the app.</b><br><br>'+(e&&e.message?e.message:e)+'</div>'; }

})();

</script>
<script>
  // Register the service worker so the app works offline once visited online.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function (e) {
        // Registration can fail when opened as a file:// URL — that's fine, app still runs.
        console.log('SW registration skipped:', e && e.message);
      });
    });
  }
</script>
</body>
</html>
